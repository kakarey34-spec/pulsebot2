services:
  - type: web
    name: pulsebot2
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: GUILD_ID
        sync: false
    disk:
      name: pulsebot-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
